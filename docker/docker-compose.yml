version: "3.8"

services:
  yadem-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql+asyncpg://yadem:yadem_pass@postgres:5432/yadem_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    volumes:
      - ../models:/app/models

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: yadem_db
      POSTGRES_USER: yadem
      POSTGRES_PASSWORD: yadem_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
