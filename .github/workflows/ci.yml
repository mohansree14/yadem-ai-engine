name: CI — Lint, Test, Validate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest mypy

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Type check with mypy
        run: mypy src/ --ignore-missing-imports
        continue-on-error: true

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

      - name: Run synthetic data generation test
        run: |
          python -c "
          from src.data.synthetic.generator import SyntheticDataGenerator
          gen = SyntheticDataGenerator()
          df = gen.generate(n_samples=100)
          assert len(df) == 100, f'Expected 100 rows, got {len(df)}'
          assert df.shape[1] > 30, f'Expected 30+ columns, got {df.shape[1]}'
          print(f'✓ Generated {len(df)} samples with {df.shape[1]} features')
          "

      - name: Validate feature engineering
        run: |
          python -c "
          from src.data.synthetic.generator import SyntheticDataGenerator
          from src.features.engine import FeatureEngine
          gen = SyntheticDataGenerator()
          df = gen.generate(n_samples=50)
          engine = FeatureEngine()
          features = engine.engineer(df)
          assert features.shape[1] > 80, f'Expected 80+ features, got {features.shape[1]}'
          print(f'✓ Engineered {features.shape[1]} features from {df.shape[1]} raw columns')
          "
